<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>

    <link rel="shortcut icon" href="./assets/icons/stadia_controller.svg" type="image/x-icon">
  <script type="module" crossorigin src="/memory/assets/main-C1uFXdWD.js"></script>
  <link rel="stylesheet" crossorigin href="/memory/assets/main-BfmFR8Qs.css">
</head>
<body>
    <section class="settingsFrame">
        <div class="captionContainer">
            <span class="captionContainer__text distance">Settings</span>
            <div class="divider-zero">
                <div class="divider__square-l"></div>
                <div class="divider__line-xl"></div>
            </div>
        </div>
        <div class="settingsContent">
            <section class="settingsContent__left">
                <fieldset class="radioGroup">
                    <legend class="radioGroup__caption">
                        <img class="radioGroup__icon" src="./assets/icons/game_themes_icon.svg" alt="theme icon">
                        <span class="radioGroup__text">Game themes</span>
                    </legend>
                    <label id="label_code_theme" class="radio">
                        <input type="radio" name="theme" value="code_vibes">
                        <span id="span_code_theme" class="radio__label">Code vibes theme</span>
                        <div id="divider_code_theme" class="width invisible">
                            <div class="divider-half">
                                <div class="divider__square-s"></div>
                                <div class="divider__line-xl"></div>
                            </div>
                        </div>
                    </label>
                    <label id="label_food_theme" class="radio">
                        <input type="radio" name="theme" value="food_theme">
                        <span id="span_food_theme" class="radio__label">Foods theme</span>
                        <div id="divider_food_theme" class="width invisible">
                            <div class="divider-half">
                                <div class="divider__square-s"></div>
                                <div class="divider__line-xl"></div>
                            </div>
                        </div>
                    </label>
                </fieldset>
                <fieldset class="radioGroup">
                    <legend class="radioGroup__caption">
                        <img class="radioGroup__icon" src="./assets/icons/choose_player_icon.svg" alt="choose player icon as chess piece">
                        <span class="radioGroup__text">Choose player</span>
                    </legend>
                    <label id="label_blue_player" class="radio">
                        <input type="radio" name="player" value="blue">
                        <span id="span_blue_player" class="radio__label">Blue</span>
                        <div id="divider_blue_player" class="width invisible">
                            <div class="divider-half">
                                <div class="divider__square-s"></div>
                                <div class="divider__line-xl"></div>
                            </div>
                        </div>
                    </label>
                    <label id="label_orange_player" class="radio">
                        <input type="radio" name="player" value="orange">
                        <span id="span_orange_player" class="radio__label">Orange</span>
                        <div id="divider_orange_player" class="width invisible">
                            <div class="divider-half">
                                <div class="divider__square-s"></div>
                                <div class="divider__line-xl"></div>
                            </div>
                        </div>
                    </label>
                </fieldset>
                <fieldset class="radioGroup">
                    <legend class="radioGroup__caption">
                        <img class="radioGroup__icon" src="./assets/icons/board_size_icon.svg" alt="board size icon as swing card">
                        <span class="radioGroup__text">Board size</span>
                    </legend>
                    <label id="label_16_cards" class="radio">
                        <input type="radio" name="board_size" value="sixteen">
                        <span id="span_16_cards" class="radio__label">16 cards</span>
                        <div id="divider_16_cards" class="width invisible">
                            <div class="divider-half">
                                <div class="divider__square-s"></div>
                                <div class="divider__line-xl"></div>
                            </div>
                        </div>
                    </label>
                    <label id="label_24_cards" class="radio">
                        <input type="radio" name="board_size" value="twentyfour">
                        <span id="span_24_cards" class="radio__label">24 cards</span>
                        <div id="divider_24_cards" class="width invisible">
                            <div class="divider-half">
                                <div class="divider__square-s"></div>
                                <div class="divider__line-xl"></div>
                            </div>
                        </div>
                    </label>
                    <label id="label_36_cards" class="radio">
                        <input type="radio" name="board_size" value="thirtysix">
                        <span id="span_36_cards" class="radio__label">36 cards</span>
                        <div id="divider_36_cards" class="width invisible">
                            <div class="divider-half">
                                <div class="divider__square-s"></div>
                                <div class="divider__line-xl"></div>
                            </div>
                        </div>
                    </label>
                </fieldset>
            </section>
            <section class="settingsContent__right">
                <img id="theme_image" class="settingsContent__right__image" src="./assets/img/image_code_vibes_theme.svg" alt="image with preview of code theme">
                <div class="settingsState">
                    <div class="settingsState__box">
                        <span id="state_theme" class="settingsState__box__text text-l width-theme">Game theme</span>
                        <div id="divider_state_theme" class="width">
                            <div class="divider-eighth">
                                <div class="divider__square-zero"></div>
                                <div class="divider__line-xxl"></div>
                            </div>
                        </div>
                        <div id="divider_theme_choosen" class="width invisible">
                            <div class="divider-eighth">
                                <div class="divider__square-s"></div>
                                <div class="divider__line-xl"></div>
                            </div>
                        </div>
                        <span id="state_player" class="settingsState__box__text text-l width-player">Player</span>
                        <div id="divider_state_player" class="width">
                            <div class="divider-eighth">
                                <div class="divider__square-zero"></div>
                                <div class="divider__line-xxl"></div>
                            </div>
                        </div>
                        <div id="divider_player_choosen" class="width invisible">
                            <div class="divider-eighth">
                                <div class="divider__square-s"></div>
                                <div class="divider__line-xl"></div>
                            </div>
                        </div>
                        <span id="state_board" class="settingsState__box__text text-l width-board">Board size</span>
                        <div class="padding-left-l">
                            <button id="start_button" class="yellowBtn yellowBtn__disabled">
                                <img class="yellowBtn__img1" src="./assets/icons/start_icon.svg" alt="play icon with border">
                                <span class="yellowBtn__text text-l">Start</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </section>  
</body>
</html>
